digest_prompt: |
  Format each of the 5 items into one-line hero insight with URL at the end.

  REQUIRED OUTPUT FORMAT:
  [Hero insight about what was built/achieved/discovered] — [Source Label] [Full URL]

  EXAMPLE OUTPUT:
  Anthropic built CASH framework achieving junior PM productivity in 4 hours instead of weeks — Lenny's Newsletter https://lennysnewsletter.com/p/anthropic-cash-framework...

  RULES:
  - Start directly with the insight (no "Item 1:" prefixes)
  - Use action verbs: built, achieved, discovered, scaled, automated
  - 12-18 words describing the hero insight
  - MUST end with: — SourceName FullURL
  - Include the full URL from the input, not shortened

  INPUT ITEMS:
