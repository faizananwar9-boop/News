    - keyword: "copilot"
      weight: 2.0
    - keyword: "automation"
      weight: 2.0
    - keyword: "growth"
      weight: 2.0
    - keyword: "user research"
      weight: 2.0
    - keyword: "productivity"
  
  medium_value_keywords:
    - keyword: "startup"
      weight: 0.5
    - keyword: "founder"
      weight: 0.5
    - keyword: "venture"
      weight: 0.5
    - keyword: "funding"
      weight: 0.5
    - keyword: "scale"
      weight: 0.5
    - keyword: "hiring"
      weight: 0.5
    - keyword: "leadership"
      weight: 0.5
    - keyword: "design"
      weight: 0.5
    - keyword: "ux"
      weight: 0.5
    - keyword: "analytics"
      weight: 0.5
    - keyword: "metrics"
      weight: 0.5
    - keyword: "experiment"
      weight: 0.5

  negative_keywords:
    - "birthday wishes"
    - "happy birthday"
    - "b'day"
    - "bday"
    - "best wishes"
    - "wish you"
    - "congratulations"

  bonus_patterns:
    - pattern: "how to|guide|framework|playbook"
      weight: 1.5
    - pattern: "\\d+%|\\$\\d+|[0-9]+x"
      weight: 1.0

schedule:
  morning_utc: "30 1 * * *"
  evening_utc: "30 11 * * *"

