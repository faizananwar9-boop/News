      weight: 2.0
    - keyword: "agentic"
      weight: 2.0
    - keyword: "product strategy"
      weight: 2.0
    - keyword: "product management"
      weight: 2.0
    - keyword: "growth"
      weight: 2.0
    - keyword: "user research"
      weight: 2.0
    - keyword: "customer discovery"
      weight: 2.0
    - keyword: "revenue"
      weight: 2.0
