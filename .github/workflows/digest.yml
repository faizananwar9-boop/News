name: Daily digest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "30 1 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      topics: ${{ steps.list.outputs.topics }}
    steps:
      - uses: actions/checkout@v4
      - id: list
        run: |
          cd intel-feed
          files=$(ls topics/*.yaml | jq -R . | jq -sc .)
          echo "topics=$files" >> $GITHUB_OUTPUT

  run-digest:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        topic: ${{ fromJson(needs.discover.outputs.topics) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: cd intel-feed && pip install -r requirements.txt
      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_PM_AI: ${{ secrets.TELEGRAM_CHAT_PM_AI }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cd intel-feed && python main.py ${{ matrix.topic }}
      - name: Set artifact name
        run: echo "ARTIFACT_NAME=logs-$(basename ${{ matrix.topic }})" >> $GITHUB_ENV
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: intel-feed/intel_feed.log
